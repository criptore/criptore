name: GitHub Stats README

on:
  schedule:
    - cron: '0 18 * * *'   # tous les jours à 18h UTC
  workflow_dispatch:         # déclenchement manuel possible

jobs:
  update-readme:
    name: Update README with GitHub Stats
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # ✅ Sections GitHub uniquement (pas WakaTime)
          SHOW_LANGUAGE_PER_REPO: "True"   # langages par repo
          SHOW_COMMIT: "True"              # commits matin/soir/nuit
          SHOW_DAYS_OF_WEEK: "True"        # commits par jour

          # ❌ Sections WakaTime désactivées
          SHOW_OS: "False"
          SHOW_EDITORS: "False"
          SHOW_LANGUAGE: "False"
          SHOW_TIMEZONE: "False"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"

          # Ordre : langages par repo → commits par heure → commits par jour
          SECTION_ORDER: "language_per_repo, commit, day_of_week"
